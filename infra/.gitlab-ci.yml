stages:
  - lint
  - build

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: always
    - when: never

default:
  before_script:
    - echo "source=$CI_PIPELINE_SOURCE branch=$CI_COMMIT_BRANCH sha=$CI_COMMIT_SHA"

# lint stage
.lint-template:
  tags: [docker-shared]
  stage: lint

.lint-backend-template:
  extends: .lint-template
  image: gradle:8.14.4-jdk21-alpine
  variables:
    GRADLE_USER_HOME: "$CI_PROJECT_DIR/backend/.gradle"
  cache:
    key:
      files:
        - backend/gradle/wrapper/gradle-wrapper.properties
        - backend/build.gradle
    paths:
      - backend/.gradle/
  before_script:
    - echo "source=$CI_PIPELINE_SOURCE branch=$CI_COMMIT_BRANCH sha=$CI_COMMIT_SHA"
    - cd backend
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - infra/.gitlab-ci.yml
        - backend/**/*

.lint-frontend-template:
  extends: .lint-template
  image: node:24-alpine
  cache:
    key:
      files:
        - frontend/package-lock.json
    paths:
      - frontend/.npm/
  before_script:
    - echo "source=$CI_PIPELINE_SOURCE branch=$CI_COMMIT_BRANCH sha=$CI_COMMIT_SHA"
    - cd frontend
    - npm ci --cache .npm --prefer-offline
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - infra/.gitlab-ci.yml
        - frontend/**/*

.lint-ai-template:
  extends: .lint-template
  image: ghcr.io/astral-sh/uv:0.10.9-python3.12-trixie
  variables:
    UV_CACHE_DIR: "$CI_PROJECT_DIR/ai/.uv-cache"
  cache:
    key:
      files:
        - ai/uv.lock
        - ai/pyproject.toml
    paths:
      - ai/.uv-cache/
  before_script:
    - echo "source=$CI_PIPELINE_SOURCE branch=$CI_COMMIT_BRANCH sha=$CI_COMMIT_SHA"
    - cd ai
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - infra/.gitlab-ci.yml
        - ai/**/*

lint-backend:
  extends: .lint-backend-template
  script:
    - chmod +x gradlew
    - ./gradlew --no-daemon checkstyleMain checkstyleTest
  artifacts:
    when: always
    paths:
      - backend/build/reports/checkstyle/main.html

lint-frontend:
  extends: .lint-frontend-template
  script:
    - npm run lint -- --format stylish | tee eslint-report.txt
    - npm run typecheck
    - npm run format:check
  artifacts:
    when: always
    paths:
      - frontend/eslint-report.txt

lint-ai:
  extends: .lint-ai-template
  script:
    - uv sync --frozen
    - uv run ruff check .

infra-compose-validate:
  extends: .lint-template
  image: docker:29.3.0
  services:
    - docker:29.3.0-dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  script:
    - |
      set -e
      files=$(find infra -maxdepth 1 -type f \( -name "docker-compose*.yml" -o -name "docker-compose*.yaml" \))
      for f in $files; do
        echo "Validating $f"
        docker compose -f "$f" config > /dev/null
      done
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "develop"'
      changes:
        - infra/docker-compose*.yml
        - infra/docker-compose*.yaml
      when: on_success
    - when: never

# build stage
.build-template:
  tags: [docker-shared]
  stage: build
  image: docker:29.3.0
  services:
    - docker:29.3.0-dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - echo "source=$CI_PIPELINE_SOURCE branch=$CI_COMMIT_BRANCH sha=$CI_COMMIT_SHA"
    - docker info

build-backend:
  extends: .build-template
  script:
    - docker build -f ./backend/Dockerfile backend
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "develop"'
      changes:
        - backend/**/*
      when: on_success
    - when: never

build-web:
  extends: .build-template
  script:
    - docker build -f ./infra/nginx/Dockerfile .
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "develop"'
      changes:
        - frontend/**/*
        - infra/nginx/**/*
      when: on_success
    - when: never