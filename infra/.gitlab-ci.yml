stages:
  - lint
  - prebuild
  - build_and_scan

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: always
    - when: never

default:
  before_script:
    - echo "source=$CI_PIPELINE_SOURCE branch=$CI_COMMIT_BRANCH sha=$CI_COMMIT_SHA"

# lint stage
.lint_template:
  tags: [docker-shared]
  stage: lint

.lint_backend_template:
  extends: .lint_template
  image: gradle:8.14.4-jdk21-alpine
  variables:
    GRADLE_USER_HOME: "$CI_PROJECT_DIR/backend/.gradle"
  cache:
    key:
      files:
        - backend/gradle/wrapper/gradle-wrapper.properties
        - backend/build.gradle
    paths:
      - backend/.gradle/
  before_script:
    - echo "source=$CI_PIPELINE_SOURCE branch=$CI_COMMIT_BRANCH sha=$CI_COMMIT_SHA"
    - cd backend
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - infra/.gitlab-ci.yml
        - backend/**/*

.lint_frontend_template:
  extends: .lint_template
  image: node:24-alpine
  cache:
    key:
      files:
        - frontend/package-lock.json
    paths:
      - frontend/.npm/
  before_script:
    - echo "source=$CI_PIPELINE_SOURCE branch=$CI_COMMIT_BRANCH sha=$CI_COMMIT_SHA"
    - cd frontend
    - npm ci --cache .npm --prefer-offline
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - infra/.gitlab-ci.yml
        - frontend/**/*

.lint_ai_template:
  extends: .lint_template
  image: ghcr.io/astral-sh/uv:0.10.9-python3.12-trixie
  variables:
    UV_CACHE_DIR: "$CI_PROJECT_DIR/ai/.uv-cache"
  cache:
    key:
      files:
        - ai/uv.lock
        - ai/pyproject.toml
    paths:
      - ai/.uv-cache/
  before_script:
    - echo "source=$CI_PIPELINE_SOURCE branch=$CI_COMMIT_BRANCH sha=$CI_COMMIT_SHA"
    - cd ai
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - infra/.gitlab-ci.yml
        - ai/**/*

lint_backend:
  extends: .lint_backend_template
  script:
    - chmod +x gradlew
    - ./gradlew --no-daemon checkstyleMain checkstyleTest
  artifacts:
    when: always
    paths:
      - backend/build/reports/checkstyle/main.html

lint_frontend:
  extends: .lint_frontend_template
  script:
    - npm run lint -- --format stylish | tee eslint-report.txt
    - npm run typecheck
    - npm run format:check
  artifacts:
    when: always
    paths:
      - frontend/eslint-report.txt

lint_ai:
  extends: .lint_ai_template
  script:
    - uv sync --frozen
    - uv run ruff check .

infra_compose_validate:
  extends: .lint_template
  image: docker:29.3.0
  services:
    - docker:29.3.0-dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  script:
    - |
      set -e
      files=$(find infra -maxdepth 1 -type f \( -name "docker-compose*.yml" -o -name "docker-compose*.yaml" \))
      for f in $files; do
        echo "Validating $f"
        docker compose -f "$f" config > /dev/null
      done
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "develop"'
      changes:
        - infra/docker-compose*.yml
        - infra/docker-compose*.yaml
      when: on_success
    - when: never

# prebuild stage
.prebuild_template:
  tags: [docker-shared]
  stage: prebuild
  image:
    name: docker.io/aquasec/trivy:latest
    entrypoint: [""]
  variables:
    TRIVY_NO_PROGRESS: "true"
    TRIVY_CACHE_DIR: ".trivycache/"
  cache:
    paths:
      - .trivycache/

trivy_prebuild_backend:
  extends: .prebuild_template
  script:
    - trivy fs --format template --template "@infra/trivy/html.tpl" -o backend-trivy-prebuild-report.html ./backend/
    - trivy config --format template --template "@infra/trivy/html.tpl" -o backend-config-trivy-prebuild-report.html ./backend/
    - trivy fs --exit-code 1 --severity HIGH,CRITICAL ./backend
    - trivy config --exit-code 1 --severity HIGH,CRITICAL ./backend
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "develop"'
      changes:
        - infra/.gitlab-ci.yml
        - backend/**/*
      when: on_success
    - when: never
  artifacts:
    when: always
    paths:
      - backend-trivy-prebuild-report.html
      - backend-config-trivy-prebuild-report.html

trivy_prebuild_web:
  extends: .prebuild_template
  script:
    - trivy fs --format template --template "@infra/trivy/html.tpl" -o web-trivy-prebuild-report.html ./frontend/
    - trivy fs --format template --template "@infra/trivy/html.tpl" -o web-nginx-trivy-prebuild-report.html ./infra/nginx/
    - trivy config --format template --template "@infra/trivy/html.tpl" -o web-config-trivy-prebuild-report.html ./frontend/
    - trivy config --format template --template "@infra/trivy/html.tpl" -o web-nginx-config-trivy-prebuild-report.html ./infra/nginx/
    - trivy fs --exit-code 1 --severity HIGH,CRITICAL ./frontend/
    - trivy config --exit-code 1 --severity HIGH,CRITICAL ./frontend/
    - trivy fs --exit-code 1 --severity HIGH,CRITICAL ./infra/nginx/
    - trivy config --exit-code 1 --severity HIGH,CRITICAL ./infra/nginx/
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "develop"'
      changes:
        - infra/.gitlab-ci.yml
        - frontend/**/*
        - infra/nginx/**/*
      when: on_success
    - when: never
  artifacts:
    when: always
    paths:
      - web-trivy-prebuild-report.html
      - web-config-trivy-prebuild-report.html
      - web-nginx-trivy-prebuild-report.html
      - web-nginx-config-trivy-prebuild-report.html

trivy_prebuild_ai:
  extends: .prebuild_template
  script:
    - trivy fs --format template --template "@infra/trivy/html.tpl" -o ai-trivy-prebuild-report.html ./ai/
    - trivy config --format template --template "@infra/trivy/html.tpl" -o ai-config-trivy-prebuild-report.html ./ai/
    - trivy fs --exit-code 1 --severity HIGH,CRITICAL ./ai
    - trivy config --exit-code 1 --severity HIGH,CRITICAL ./ai
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "develop"'
      changes:
        - infra/.gitlab-ci.yml
        - ai/**/*
      when: on_success
    - when: never
  artifacts:
    when: always
    paths:
      - ai-trivy-prebuild-report.html
      - ai-config-trivy-prebuild-report.html

# build_and_scan stage
.build_and_scan_template:
  tags: [docker-shared]
  stage: build_and_scan
  image: docker:29.3.0
  services:
    - docker:29.3.0-dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - echo "source=$CI_PIPELINE_SOURCE branch=$CI_COMMIT_BRANCH sha=$CI_COMMIT_SHA"
    - docker info
    - wget -qO- https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
    - trivy --version

build_and_scan_backend:
  extends: .build_and_scan_template
  script:
    - docker build -t backend:$CI_COMMIT_SHA -f ./backend/Dockerfile ./backend
    - trivy image --format template --template "@infra/trivy/html.tpl" -o backend-trivy-report.html backend:$CI_COMMIT_SHA
    - trivy image --exit-code 1 --severity HIGH,CRITICAL backend:$CI_COMMIT_SHA
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "develop"'
      changes:
        - infra/.gitlab-ci.yml
        - backend/**/*
      when: on_success
    - when: never
  artifacts:
    when: always
    paths:
      - backend-trivy-report.html

build_and_scan_web:
  extends: .build_and_scan_template
  script:
    - docker build -t web:$CI_COMMIT_SHA -f ./infra/nginx/Dockerfile .
    - trivy image --format template --template "@infra/trivy/html.tpl" -o web-trivy-report.html web:$CI_COMMIT_SHA
    - trivy image --exit-code 1 --severity HIGH,CRITICAL web:$CI_COMMIT_SHA
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "develop"'
      changes:
        - infra/.gitlab-ci.yml
        - frontend/**/*
        - infra/nginx/**/*
      when: on_success
    - when: never
  artifacts:
    when: always
    paths:
      - web-trivy-report.html
