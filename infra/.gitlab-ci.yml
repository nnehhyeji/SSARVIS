stages:
  - lint
  - security_scan
  - build_and_scan
  - deploy

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: always
    - if: '$CI_PIPELINE_SOURCE == "push"'
      when: always
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: always
    - when: never

default:
  before_script:
    - echo "source=$CI_PIPELINE_SOURCE branch=$CI_COMMIT_BRANCH sha=$CI_COMMIT_SHA"

# lint stage
.lint_template:
  tags: [docker-shared]
  stage: lint

.lint_backend_template:
  extends: .lint_template
  image: gradle:8.14.4-jdk21-alpine
  variables:
    GRADLE_USER_HOME: "$CI_PROJECT_DIR/backend/.gradle"
  cache:
    key:
      files:
        - backend/gradle/wrapper/gradle-wrapper.properties
        - backend/build.gradle
    paths:
      - backend/.gradle/
  before_script:
    - echo "source=$CI_PIPELINE_SOURCE branch=$CI_COMMIT_BRANCH sha=$CI_COMMIT_SHA"
    - cd backend
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - infra/.gitlab-ci.yml
        - backend/**/*

.lint_frontend_template:
  extends: .lint_template
  image: node:24-alpine
  cache:
    key:
      files:
        - frontend/package-lock.json
    paths:
      - frontend/.npm/
  before_script:
    - echo "source=$CI_PIPELINE_SOURCE branch=$CI_COMMIT_BRANCH sha=$CI_COMMIT_SHA"
    - cd frontend
    - npm ci --cache .npm --prefer-offline
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - infra/.gitlab-ci.yml
        - frontend/**/*

.lint_ai_template:
  extends: .lint_template
  image: ghcr.io/astral-sh/uv:0.10.9-python3.12-trixie
  variables:
    UV_CACHE_DIR: "$CI_PROJECT_DIR/ai/.uv-cache"
  cache:
    key:
      files:
        - ai/uv.lock
        - ai/pyproject.toml
    paths:
      - ai/.uv-cache/
  before_script:
    - echo "source=$CI_PIPELINE_SOURCE branch=$CI_COMMIT_BRANCH sha=$CI_COMMIT_SHA"
    - cd ai
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - infra/.gitlab-ci.yml
        - ai/**/*

lint_backend:
  extends: .lint_backend_template
  script:
    - chmod +x gradlew
    - ./gradlew --no-daemon checkstyleMain checkstyleTest
  artifacts:
    when: always
    paths:
      - backend/build/reports/checkstyle/main.html

lint_frontend:
  extends: .lint_frontend_template
  script:
    - npm run lint -- --format stylish | tee eslint-report.txt
    - npm run typecheck
    - npm run format:check
  artifacts:
    when: always
    paths:
      - frontend/eslint-report.txt

lint_ai:
  extends: .lint_ai_template
  script:
    - uv sync --frozen
    - uv run ruff check .

infra_compose_validate:
  extends: .lint_template
  image: docker:29.3.0
  services:
    - docker:29.3.0-dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  script:
    - |
      set -e
      files=$(find infra -maxdepth 1 -type f \( -name "docker-compose*.yml" -o -name "docker-compose*.yaml" \))
      for f in $files; do
        echo "Validating $f"
        docker compose -f "$f" config > /dev/null
      done
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "develop"'
      changes:
        - infra/docker-compose*.yml
        - infra/docker-compose*.yaml
      when: on_success
    - when: never

# security_scan stage
.security_scan_template:
  tags: [docker-shared]
  stage: security_scan
  image:
    name: docker.io/aquasec/trivy:latest
    entrypoint: [""]
  variables:
    TRIVY_NO_PROGRESS: "true"
    TRIVY_CACHE_DIR: ".trivycache/"
  cache:
    paths:
      - .trivycache/

trivy_security_backend:
  extends: .security_scan_template
  script:
    - trivy fs --format template --template "@infra/trivy/html.tpl" -o backend-fs-report.html ./backend/
    - trivy config --format template --template "@infra/trivy/html.tpl" -o backend-config-report.html ./backend/
    - trivy fs --exit-code 1 --severity HIGH,CRITICAL ./backend
    - trivy config --exit-code 1 --severity HIGH,CRITICAL ./backend
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "develop"'
      changes:
        - infra/.gitlab-ci.yml
        - backend/**/*
      when: on_success
    - when: never
  artifacts:
    when: always
    paths:
      - backend-fs-report.html
      - backend-config-report.html

trivy_security_web:
  extends: .security_scan_template
  script:
    - trivy fs --format template --template "@infra/trivy/html.tpl" -o web-fs-report.html ./frontend/
    - trivy fs --format template --template "@infra/trivy/html.tpl" -o web-nginx-fs-report.html ./infra/nginx/
    - trivy config --format template --template "@infra/trivy/html.tpl" -o web-config-report.html ./frontend/
    - trivy config --format template --template "@infra/trivy/html.tpl" -o web-nginx-config-report.html ./infra/nginx/
    - trivy fs --exit-code 1 --severity HIGH,CRITICAL ./frontend/
    - trivy config --exit-code 1 --severity HIGH,CRITICAL ./frontend/
    - trivy fs --exit-code 1 --severity HIGH,CRITICAL ./infra/nginx/
    - trivy config --exit-code 1 --severity HIGH,CRITICAL ./infra/nginx/
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "develop"'
      changes:
        - infra/.gitlab-ci.yml
        - frontend/**/*
        - infra/nginx/**/*
      when: on_success
    - when: never
  artifacts:
    when: always
    paths:
      - web-fs-report.html
      - web-config-report.html
      - web-nginx-fs-report.html
      - web-nginx-config-report.html

trivy_security_ai:
  extends: .security_scan_template
  script:
    - trivy fs --format template --template "@infra/trivy/html.tpl" -o ai-fs-report.html ./ai/
    - trivy config --format template --template "@infra/trivy/html.tpl" -o ai-config-report.html ./ai/
    - trivy fs --exit-code 1 --severity HIGH,CRITICAL ./ai
    - trivy config --exit-code 1 --severity HIGH,CRITICAL ./ai
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "develop"'
      changes:
        - infra/.gitlab-ci.yml
        - ai/**/*
      when: on_success
    - when: never
  artifacts:
    when: always
    paths:
      - ai-fs-report.html
      - ai-config-report.html

# build_and_scan stage
.build_and_scan_template:
  tags: [docker-shared]
  stage: build_and_scan
  image: docker:29.3.0
  services:
    - docker:29.3.0-dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    DOCKER_BUILDKIT: "1"
    BUILDKIT_INLINE_CACHE: "1"
  before_script:
    - echo "source=$CI_PIPELINE_SOURCE branch=$CI_COMMIT_BRANCH sha=$CI_COMMIT_SHA"
    - docker info
    - echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin

build_and_scan_backend:
  extends: .build_and_scan_template
  script:
    - docker pull "$DOCKERHUB_USERNAME/ssarvis-backend:buildcache" || true
    - docker build --build-arg BUILDKIT_INLINE_CACHE=1 --cache-from "$DOCKERHUB_USERNAME/ssarvis-backend:buildcache" -t backend:$CI_COMMIT_SHA -f ./backend/Dockerfile ./backend
    - docker tag backend:$CI_COMMIT_SHA "$DOCKERHUB_USERNAME/ssarvis-backend:$CI_COMMIT_SHA"
    - docker tag backend:$CI_COMMIT_SHA "$DOCKERHUB_USERNAME/ssarvis-backend:buildcache"
    - docker push "$DOCKERHUB_USERNAME/ssarvis-backend:$CI_COMMIT_SHA"
    - docker push "$DOCKERHUB_USERNAME/ssarvis-backend:buildcache"
    - docker run --rm -e TRIVY_USERNAME="$DOCKERHUB_USERNAME" -e TRIVY_PASSWORD="$DOCKERHUB_TOKEN" -v "$CI_PROJECT_DIR:/work" -w /work aquasec/trivy:latest image --format template --template "@infra/trivy/html.tpl" -o backend-image-report.html "$DOCKERHUB_USERNAME/ssarvis-backend:$CI_COMMIT_SHA"
    - docker run --rm -e TRIVY_USERNAME="$DOCKERHUB_USERNAME" -e TRIVY_PASSWORD="$DOCKERHUB_TOKEN" aquasec/trivy:latest image --exit-code 1 --severity HIGH,CRITICAL "$DOCKERHUB_USERNAME/ssarvis-backend:$CI_COMMIT_SHA"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "develop"'
      changes:
        - infra/.gitlab-ci.yml
        - backend/**/*
      when: on_success
    - when: never
  artifacts:
    when: always
    paths:
      - backend-image-report.html

build_and_scan_web:
  extends: .build_and_scan_template
  script:
    - docker pull "$DOCKERHUB_USERNAME/ssarvis-web:buildcache" || true
    - docker build --build-arg BUILDKIT_INLINE_CACHE=1 --cache-from "$DOCKERHUB_USERNAME/ssarvis-web:buildcache" -t web:$CI_COMMIT_SHA -f ./infra/nginx/Dockerfile .
    - docker tag web:$CI_COMMIT_SHA "$DOCKERHUB_USERNAME/ssarvis-web:$CI_COMMIT_SHA"
    - docker tag web:$CI_COMMIT_SHA "$DOCKERHUB_USERNAME/ssarvis-web:buildcache"
    - docker push "$DOCKERHUB_USERNAME/ssarvis-web:$CI_COMMIT_SHA"
    - docker push "$DOCKERHUB_USERNAME/ssarvis-web:buildcache"
    - docker run --rm -e TRIVY_USERNAME="$DOCKERHUB_USERNAME" -e TRIVY_PASSWORD="$DOCKERHUB_TOKEN" -v "$CI_PROJECT_DIR:/work" -w /work aquasec/trivy:latest image --format template --template "@infra/trivy/html.tpl" -o web-image-report.html "$DOCKERHUB_USERNAME/ssarvis-web:$CI_COMMIT_SHA"
    - docker run --rm -e TRIVY_USERNAME="$DOCKERHUB_USERNAME" -e TRIVY_PASSWORD="$DOCKERHUB_TOKEN" aquasec/trivy:latest image --exit-code 1 --severity HIGH,CRITICAL "$DOCKERHUB_USERNAME/ssarvis-web:$CI_COMMIT_SHA"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "develop"'
      changes:
        - infra/.gitlab-ci.yml
        - frontend/**/*
        - infra/nginx/**/*
      when: on_success
    - when: never
  artifacts:
    when: always
    paths:
      - web-image-report.html

.promote_image_template:
  extends: .build_and_scan_template
  before_script:
    - echo "source=$CI_PIPELINE_SOURCE branch=$CI_COMMIT_BRANCH sha=$CI_COMMIT_SHA"
    - docker info
    - apk add --no-cache git
    - echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin

promote_backend:
  extends: .promote_image_template
  script:
    - |
      set -e
      parents=$(git rev-list --parents -n 1 "$CI_COMMIT_SHA")
      set -- $parents
      source_tag="$CI_COMMIT_SHA"
      if [ "$#" -ge 3 ]; then
        source_tag="$3"
      fi
      source_image="$DOCKERHUB_USERNAME/ssarvis-backend:$source_tag"
      fallback_image="$DOCKERHUB_USERNAME/ssarvis-backend:prod"
      if ! docker pull "$source_image"; then
        echo "Falling back to $fallback_image because $source_image was not found"
        docker pull "$fallback_image"
        source_image="$fallback_image"
      fi
      docker tag "$source_image" "$DOCKERHUB_USERNAME/ssarvis-backend:$CI_COMMIT_SHA"
      docker tag "$source_image" "$DOCKERHUB_USERNAME/ssarvis-backend:prod"
      docker push "$DOCKERHUB_USERNAME/ssarvis-backend:$CI_COMMIT_SHA"
      docker push "$DOCKERHUB_USERNAME/ssarvis-backend:prod"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "main"'
      when: on_success
    - when: never

promote_web:
  extends: .promote_image_template
  script:
    - |
      set -e
      parents=$(git rev-list --parents -n 1 "$CI_COMMIT_SHA")
      set -- $parents
      source_tag="$CI_COMMIT_SHA"
      if [ "$#" -ge 3 ]; then
        source_tag="$3"
      fi
      source_image="$DOCKERHUB_USERNAME/ssarvis-web:$source_tag"
      fallback_image="$DOCKERHUB_USERNAME/ssarvis-web:prod"
      if ! docker pull "$source_image"; then
        echo "Falling back to $fallback_image because $source_image was not found"
        docker pull "$fallback_image"
        source_image="$fallback_image"
      fi
      docker tag "$source_image" "$DOCKERHUB_USERNAME/ssarvis-web:$CI_COMMIT_SHA"
      docker tag "$source_image" "$DOCKERHUB_USERNAME/ssarvis-web:prod"
      docker push "$DOCKERHUB_USERNAME/ssarvis-web:$CI_COMMIT_SHA"
      docker push "$DOCKERHUB_USERNAME/ssarvis-web:prod"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "main"'
      when: on_success
    - when: never

# deploy stage
deploy:
  tags: [docker-shared]
  stage: deploy
  image: alpine:3.19.9
  before_script:
    - echo "source=$CI_PIPELINE_SOURCE branch=$CI_COMMIT_BRANCH sha=$CI_COMMIT_SHA"
    - apk add --no-cache bash openssh-client
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - chmod 600 "$SSH_KEY"
    - ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts
    - chmod 644 ~/.ssh/known_hosts
  script:
    - export REMOTE_DEPLOY_DIR="/home/$USER/ssarvis/infra/deploy"
    - mkdir -p .deploy/env
    - |
      cat <<EOF > .deploy/env/app.env
      BACKEND_IMAGE=$DOCKERHUB_USERNAME/ssarvis-backend
      BACKEND_TAG=$CI_COMMIT_SHA
      WEB_IMAGE=$DOCKERHUB_USERNAME/ssarvis-web
      WEB_TAG=$CI_COMMIT_SHA
      DOCKERHUB_USERNAME=$DOCKERHUB_USERNAME
      DOCKERHUB_TOKEN=$DOCKERHUB_TOKEN
      MYSQL_HOST=$MYSQL_HOST
      MYSQL_PORT=$MYSQL_PORT
      MYSQL_DATABASE=$MYSQL_DATABASE
      MYSQL_USER=$MYSQL_USER
      MYSQL_PASSWORD=$MYSQL_PASSWORD
      REDIS_HOST=$REDIS_HOST
      REDIS_PORT=$REDIS_PORT
      SSE_TIMEOUT=$SSE_TIMEOUT
      SLACK_WEBHOOK_URL=$SLACK_WEBHOOK_URL
      JWT_SECRET=$JWT_SECRET
      JWT_ACCESS_TOKEN_TIME=$JWT_ACCESS_TOKEN_TIME
      JWT_REFRESH_TOKEN_TIME=$JWT_REFRESH_TOKEN_TIME
      S3_BUCKET_NAME=$S3_BUCKET_NAME
      MONGO_URI=$MONGO_URI
      AWS_ACCESS_KEY_ID=$AWS_ACCESS_KEY_ID
      AWS_SECRET_ACCESS_KEY=$AWS_SECRET_ACCESS_KEY
      AWS_REGION=$AWS_REGION
      ELASTIC_APM_SERVER_URL=$ELASTIC_APM_SERVER_URL
      ELASTIC_APM_SERVICE_NAME=$ELASTIC_APM_SERVICE_NAME
      ELASTIC_APM_ENVIRONMENT=$ELASTIC_APM_ENVIRONMENT
      ELASTIC_APM_APPLICATION_PACKAGES=$ELASTIC_APM_APPLICATION_PACKAGES
      EOF
    - |
      cat <<EOF > .deploy/env/db.env
      MYSQL_DATABASE=$MYSQL_DATABASE
      MYSQL_USER=$MYSQL_USER
      MYSQL_PASSWORD=$MYSQL_PASSWORD
      MYSQL_ROOT_PASSWORD=$MYSQL_PASSWORD
      EOF
    - |
      cat <<EOF > .deploy/env/monitoring.env
      SLACK_WEBHOOK_URL=$SLACK_WEBHOOK_URL
      EOF
    - ssh -i "$SSH_KEY" "$USER@$HOST" "mkdir -p '$REMOTE_DEPLOY_DIR/compose' '$REMOTE_DEPLOY_DIR/scripts' '$REMOTE_DEPLOY_DIR/env'"
    - scp -i "$SSH_KEY" infra/deploy/compose/docker-compose.app.yml "$USER@$HOST:$REMOTE_DEPLOY_DIR/compose/"
    - scp -i "$SSH_KEY" infra/deploy/compose/docker-compose.db.yml "$USER@$HOST:$REMOTE_DEPLOY_DIR/compose/"
    - scp -i "$SSH_KEY" infra/deploy/compose/docker-compose.monitoring.yml "$USER@$HOST:$REMOTE_DEPLOY_DIR/compose/"
    - scp -i "$SSH_KEY" infra/deploy/scripts/deploy.sh "$USER@$HOST:$REMOTE_DEPLOY_DIR/scripts/"
    - scp -i "$SSH_KEY" infra/deploy/scripts/init-network.sh "$USER@$HOST:$REMOTE_DEPLOY_DIR/scripts/"
    - scp -i "$SSH_KEY" .deploy/env/app.env "$USER@$HOST:$REMOTE_DEPLOY_DIR/env/"
    - scp -i "$SSH_KEY" .deploy/env/db.env "$USER@$HOST:$REMOTE_DEPLOY_DIR/env/"
    - scp -i "$SSH_KEY" .deploy/env/monitoring.env "$USER@$HOST:$REMOTE_DEPLOY_DIR/env/"
    - ssh -i "$SSH_KEY" "$USER@$HOST" "chmod +x '$REMOTE_DEPLOY_DIR/scripts/init-network.sh' '$REMOTE_DEPLOY_DIR/scripts/deploy.sh' && bash '$REMOTE_DEPLOY_DIR/scripts/deploy.sh'"
  needs:
    - job: promote_backend
      optional: true
    - job: promote_web
      optional: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "main"'
      when: on_success
    - when: never
