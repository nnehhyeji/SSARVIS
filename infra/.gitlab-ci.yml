stages:
  - lint
  - security_scan
  - build_and_scan
  - deploy

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: always
    - if: '$CI_PIPELINE_SOURCE == "push"'
      when: always
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: always
    - when: never

default:
  before_script:
    - echo "source=$CI_PIPELINE_SOURCE branch=$CI_COMMIT_BRANCH sha=$CI_COMMIT_SHA"

# lint stage
.lint_template:
  tags: [docker-shared]
  stage: lint

.lint_backend_template:
  extends: .lint_template
  image: gradle:8.14.4-jdk21-alpine
  variables:
    GRADLE_USER_HOME: "$CI_PROJECT_DIR/backend/.gradle"
  cache:
    key:
      files:
        - backend/gradle/wrapper/gradle-wrapper.properties
        - backend/build.gradle
    paths:
      - backend/.gradle/
  before_script:
    - echo "source=$CI_PIPELINE_SOURCE branch=$CI_COMMIT_BRANCH sha=$CI_COMMIT_SHA"
    - cd backend
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - infra/.gitlab-ci.yml
        - backend/**/*

.lint_frontend_template:
  extends: .lint_template
  image: node:24-alpine
  cache:
    key:
      files:
        - frontend/package-lock.json
    paths:
      - frontend/.npm/
  before_script:
    - echo "source=$CI_PIPELINE_SOURCE branch=$CI_COMMIT_BRANCH sha=$CI_COMMIT_SHA"
    - cd frontend
    - npm ci --cache .npm --prefer-offline
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - infra/.gitlab-ci.yml
        - frontend/**/*

.lint_ai_template:
  extends: .lint_template
  image: ghcr.io/astral-sh/uv:0.10.9-python3.12-trixie
  variables:
    UV_CACHE_DIR: "$CI_PROJECT_DIR/ai/.uv-cache"
  cache:
    key:
      files:
        - ai/uv.lock
        - ai/pyproject.toml
    paths:
      - ai/.uv-cache/
  before_script:
    - echo "source=$CI_PIPELINE_SOURCE branch=$CI_COMMIT_BRANCH sha=$CI_COMMIT_SHA"
    - cd ai
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - infra/.gitlab-ci.yml
        - ai/**/*

lint_backend:
  extends: .lint_backend_template
  script:
    - chmod +x gradlew
    - ./gradlew --no-daemon checkstyleMain checkstyleTest
  artifacts:
    when: always
    paths:
      - backend/build/reports/checkstyle/main.html

lint_frontend:
  extends: .lint_frontend_template
  script:
    - npm run lint -- --format stylish | tee eslint-report.txt
    - npm run typecheck
    - npm run format:check
  artifacts:
    when: always
    paths:
      - frontend/eslint-report.txt

lint_ai:
  extends: .lint_ai_template
  script:
    - uv sync --frozen
    - uv run ruff check .

infra_compose_validate:
  extends: .lint_template
  image: docker:29.3.0
  services:
    - docker:29.3.0-dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  script:
    - |
      set -e
      mkdir -p infra/deploy/env

      cat <<EOF > infra/deploy/env/app.env
      MYSQL_USER=dummy
      MYSQL_PASSWORD=dummy
      EOF

      cat <<EOF > infra/deploy/env/app.secret.env
      JWT_SECRET=dummy
      EOF

      cat <<EOF > infra/deploy/env/db.env
      MYSQL_USER=dummy
      MYSQL_PASSWORD=dummy
      MYSQL_DATABASE=dummy
      MYSQL_ROOT_PASSWORD=dummy
      EOF

      cat <<EOF > infra/deploy/env/db.secret.env
      MYSQL_PASSWORD=dummy
      MYSQL_ROOT_PASSWORD=dummy
      EOF

      cat <<EOF > infra/deploy/env/ai.env
      OPENAI_API_KEY=dummy
      DASHSCOPE_API_KEY=dummy
      QDRANT_URL=http://qdrant:6333
      EOF

      cat <<EOF > infra/deploy/env/ai.secret.env
      OPENAI_API_KEY=dummy
      EOF

      cat <<EOF > infra/deploy/env/monitoring.env
      EOF

      cat <<EOF > infra/deploy/env/monitoring.secret.env
      EOF

      export BACKEND_IMAGE=dummy/backend
      export BACKEND_TAG=latest
      export WEB_IMAGE=dummy/web
      export WEB_TAG=latest
      export AI_IMAGE=dummy/ai
      export AI_TAG=latest

      files=$(find infra/deploy/compose -maxdepth 1 -type f \( -name "docker-compose*.yml" -o -name "docker-compose*.yaml" \))
      for f in $files; do
        echo "Validating $f"
        docker compose -f "$f" config > /dev/null
      done
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "develop"'
      changes:
        - infra/deploy/compose/docker-compose*.yml
        - infra/deploy/compose/docker-compose*.yaml
      when: on_success
    - when: never

# security_scan stage
.security_scan_template:
  tags: [docker-shared]
  stage: security_scan
  image: docker:29.3.0
  services:
    - docker:29.3.0-dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    TRIVY_NO_PROGRESS: "true"
    TRIVY_CACHE_DIR: ".trivycache/"
    TRIVY_IMAGE: "docker.io/aquasec/trivy:0.63.0"
  before_script:
    - echo "source=$CI_PIPELINE_SOURCE branch=$CI_COMMIT_BRANCH sha=$CI_COMMIT_SHA"
    - rm -rf .trivycache/policy
  cache:
    key: trivy-0-63-0
    paths:
      - .trivycache/

trivy_security_backend:
  extends: .security_scan_template
  script:
    - docker run --rm -e TRIVY_NO_PROGRESS="$TRIVY_NO_PROGRESS" -e TRIVY_CACHE_DIR=/work/.trivycache -v "$CI_PROJECT_DIR:/work" -w /work "$TRIVY_IMAGE" fs --format template --template "@infra/trivy/html.tpl" -o backend-fs-report.html ./backend/
    - docker run --rm -e TRIVY_NO_PROGRESS="$TRIVY_NO_PROGRESS" -e TRIVY_CACHE_DIR=/work/.trivycache -v "$CI_PROJECT_DIR:/work" -w /work "$TRIVY_IMAGE" config --format template --template "@infra/trivy/html.tpl" -o backend-config-report.html ./backend/
    - docker run --rm -e TRIVY_NO_PROGRESS="$TRIVY_NO_PROGRESS" -e TRIVY_CACHE_DIR=/work/.trivycache -v "$CI_PROJECT_DIR:/work" -w /work "$TRIVY_IMAGE" fs --exit-code 1 --severity HIGH,CRITICAL ./backend
    - docker run --rm -e TRIVY_NO_PROGRESS="$TRIVY_NO_PROGRESS" -e TRIVY_CACHE_DIR=/work/.trivycache -v "$CI_PROJECT_DIR:/work" -w /work "$TRIVY_IMAGE" config --exit-code 1 --severity HIGH,CRITICAL ./backend
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "develop"'
      changes:
        - infra/.gitlab-ci.yml
        - backend/**/*
      when: on_success
    - when: never
  artifacts:
    when: always
    paths:
      - backend-fs-report.html
      - backend-config-report.html

trivy_security_web:
  extends: .security_scan_template
  script:
    - docker run --rm -e TRIVY_NO_PROGRESS="$TRIVY_NO_PROGRESS" -e TRIVY_CACHE_DIR=/work/.trivycache -v "$CI_PROJECT_DIR:/work" -w /work "$TRIVY_IMAGE" fs --format template --template "@infra/trivy/html.tpl" -o web-fs-report.html ./frontend/
    - docker run --rm -e TRIVY_NO_PROGRESS="$TRIVY_NO_PROGRESS" -e TRIVY_CACHE_DIR=/work/.trivycache -v "$CI_PROJECT_DIR:/work" -w /work "$TRIVY_IMAGE" fs --format template --template "@infra/trivy/html.tpl" -o web-nginx-fs-report.html ./infra/nginx/
    - docker run --rm -e TRIVY_NO_PROGRESS="$TRIVY_NO_PROGRESS" -e TRIVY_CACHE_DIR=/work/.trivycache -v "$CI_PROJECT_DIR:/work" -w /work "$TRIVY_IMAGE" config --format template --template "@infra/trivy/html.tpl" -o web-config-report.html ./frontend/
    - docker run --rm -e TRIVY_NO_PROGRESS="$TRIVY_NO_PROGRESS" -e TRIVY_CACHE_DIR=/work/.trivycache -v "$CI_PROJECT_DIR:/work" -w /work "$TRIVY_IMAGE" config --format template --template "@infra/trivy/html.tpl" -o web-nginx-config-report.html ./infra/nginx/
    - docker run --rm -e TRIVY_NO_PROGRESS="$TRIVY_NO_PROGRESS" -e TRIVY_CACHE_DIR=/work/.trivycache -v "$CI_PROJECT_DIR:/work" -w /work "$TRIVY_IMAGE" fs --exit-code 1 --severity HIGH,CRITICAL ./frontend/
    - docker run --rm -e TRIVY_NO_PROGRESS="$TRIVY_NO_PROGRESS" -e TRIVY_CACHE_DIR=/work/.trivycache -v "$CI_PROJECT_DIR:/work" -w /work "$TRIVY_IMAGE" config --exit-code 1 --severity HIGH,CRITICAL ./frontend/
    - docker run --rm -e TRIVY_NO_PROGRESS="$TRIVY_NO_PROGRESS" -e TRIVY_CACHE_DIR=/work/.trivycache -v "$CI_PROJECT_DIR:/work" -w /work "$TRIVY_IMAGE" fs --exit-code 1 --severity HIGH,CRITICAL ./infra/nginx/
    - docker run --rm -e TRIVY_NO_PROGRESS="$TRIVY_NO_PROGRESS" -e TRIVY_CACHE_DIR=/work/.trivycache -v "$CI_PROJECT_DIR:/work" -w /work "$TRIVY_IMAGE" config --exit-code 1 --severity HIGH,CRITICAL ./infra/nginx/
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "develop"'
      changes:
        - infra/.gitlab-ci.yml
        - frontend/**/*
        - infra/nginx/**/*
      when: on_success
    - when: never
  artifacts:
    when: always
    paths:
      - web-fs-report.html
      - web-config-report.html
      - web-nginx-fs-report.html
      - web-nginx-config-report.html

trivy_security_ai:
  extends: .security_scan_template
  variables:
    TRIVY_FAIL_SEVERITY: "CRITICAL"
  script:
    - docker run --rm -e TRIVY_NO_PROGRESS="$TRIVY_NO_PROGRESS" -e TRIVY_CACHE_DIR=/work/.trivycache -v "$CI_PROJECT_DIR:/work" -w /work "$TRIVY_IMAGE" fs --format template --template "@infra/trivy/html.tpl" -o ai-fs-report.html ./ai/
    - docker run --rm -e TRIVY_NO_PROGRESS="$TRIVY_NO_PROGRESS" -e TRIVY_CACHE_DIR=/work/.trivycache -v "$CI_PROJECT_DIR:/work" -w /work "$TRIVY_IMAGE" config --format template --template "@infra/trivy/html.tpl" -o ai-config-report.html ./ai/
    - docker run --rm -e TRIVY_NO_PROGRESS="$TRIVY_NO_PROGRESS" -e TRIVY_CACHE_DIR=/work/.trivycache -v "$CI_PROJECT_DIR:/work" -w /work "$TRIVY_IMAGE" fs --exit-code 1 --severity "$TRIVY_FAIL_SEVERITY" ./ai
    - docker run --rm -e TRIVY_NO_PROGRESS="$TRIVY_NO_PROGRESS" -e TRIVY_CACHE_DIR=/work/.trivycache -v "$CI_PROJECT_DIR:/work" -w /work "$TRIVY_IMAGE" config --exit-code 1 --severity "$TRIVY_FAIL_SEVERITY" ./ai
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "develop"'
      changes:
        - infra/.gitlab-ci.yml
        - ai/**/*
      when: on_success
    - when: never
  artifacts:
    when: always
    paths:
      - ai-fs-report.html
      - ai-config-report.html

# build_and_scan stage
.build_and_scan_template:
  tags: [docker-shared]
  stage: build_and_scan
  image: docker:29.3.0
  services:
    - docker:29.3.0-dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    DOCKER_BUILDKIT: "1"
    BUILDKIT_INLINE_CACHE: "1"
  before_script:
    - echo "source=$CI_PIPELINE_SOURCE branch=$CI_COMMIT_BRANCH sha=$CI_COMMIT_SHA"
    - docker info
    - echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin

build_and_scan_backend:
  extends: .build_and_scan_template
  script:
    - docker pull "$DOCKERHUB_USERNAME/ssarvis-backend:buildcache" || true
    - docker build --build-arg BUILDKIT_INLINE_CACHE=1 --cache-from "$DOCKERHUB_USERNAME/ssarvis-backend:buildcache" -t backend:$CI_COMMIT_SHA -f ./backend/Dockerfile ./backend
    - docker tag backend:$CI_COMMIT_SHA "$DOCKERHUB_USERNAME/ssarvis-backend:$CI_COMMIT_SHA"
    - docker tag backend:$CI_COMMIT_SHA "$DOCKERHUB_USERNAME/ssarvis-backend:buildcache"
    - docker push "$DOCKERHUB_USERNAME/ssarvis-backend:$CI_COMMIT_SHA"
    - docker push "$DOCKERHUB_USERNAME/ssarvis-backend:buildcache"
    - docker run --rm -e TRIVY_USERNAME="$DOCKERHUB_USERNAME" -e TRIVY_PASSWORD="$DOCKERHUB_TOKEN" -e TRIVY_NO_PROGRESS=true -v "$CI_PROJECT_DIR:/work" -w /work docker.io/aquasec/trivy:0.63.0 image --format template --template "@infra/trivy/html.tpl" -o backend-image-report.html "$DOCKERHUB_USERNAME/ssarvis-backend:$CI_COMMIT_SHA"
    - docker run --rm -e TRIVY_USERNAME="$DOCKERHUB_USERNAME" -e TRIVY_PASSWORD="$DOCKERHUB_TOKEN" -e TRIVY_NO_PROGRESS=true docker.io/aquasec/trivy:0.63.0 image --exit-code 1 --severity HIGH,CRITICAL "$DOCKERHUB_USERNAME/ssarvis-backend:$CI_COMMIT_SHA"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "develop"'
      changes:
        - infra/.gitlab-ci.yml
        - backend/**/*
      when: on_success
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "main"'
      when: on_success
    - when: never
  artifacts:
    when: always
    paths:
      - backend-image-report.html

build_and_scan_web:
  extends: .build_and_scan_template
  script:
    - docker pull "$DOCKERHUB_USERNAME/ssarvis-web:buildcache" || true
    - docker build --build-arg BUILDKIT_INLINE_CACHE=1 --cache-from "$DOCKERHUB_USERNAME/ssarvis-web:buildcache" -t web:$CI_COMMIT_SHA -f ./infra/nginx/Dockerfile .
    - docker tag web:$CI_COMMIT_SHA "$DOCKERHUB_USERNAME/ssarvis-web:$CI_COMMIT_SHA"
    - docker tag web:$CI_COMMIT_SHA "$DOCKERHUB_USERNAME/ssarvis-web:buildcache"
    - docker push "$DOCKERHUB_USERNAME/ssarvis-web:$CI_COMMIT_SHA"
    - docker push "$DOCKERHUB_USERNAME/ssarvis-web:buildcache"
    - docker run --rm -e TRIVY_USERNAME="$DOCKERHUB_USERNAME" -e TRIVY_PASSWORD="$DOCKERHUB_TOKEN" -e TRIVY_NO_PROGRESS=true -v "$CI_PROJECT_DIR:/work" -w /work docker.io/aquasec/trivy:0.63.0 image --format template --template "@infra/trivy/html.tpl" -o web-image-report.html "$DOCKERHUB_USERNAME/ssarvis-web:$CI_COMMIT_SHA"
    - docker run --rm -e TRIVY_USERNAME="$DOCKERHUB_USERNAME" -e TRIVY_PASSWORD="$DOCKERHUB_TOKEN" -e TRIVY_NO_PROGRESS=true docker.io/aquasec/trivy:0.63.0 image --exit-code 1 --severity HIGH,CRITICAL "$DOCKERHUB_USERNAME/ssarvis-web:$CI_COMMIT_SHA"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "develop"'
      changes:
        - infra/.gitlab-ci.yml
        - frontend/**/*
        - infra/nginx/**/*
      when: on_success
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "main"'
      when: on_success
    - when: never
  artifacts:
    when: always
    paths:
      - web-image-report.html

build_and_scan_ai:
  extends: .build_and_scan_template
  variables:
    TRIVY_FAIL_SEVERITY: "CRITICAL"
  script:
    - docker pull "$DOCKERHUB_USERNAME/ssarvis-ai:buildcache" || true
    - docker build --build-arg BUILDKIT_INLINE_CACHE=1 --cache-from "$DOCKERHUB_USERNAME/ssarvis-ai:buildcache" -t ai:$CI_COMMIT_SHA -f ./ai/Dockerfile ./ai
    - docker tag ai:$CI_COMMIT_SHA "$DOCKERHUB_USERNAME/ssarvis-ai:$CI_COMMIT_SHA"
    - docker tag ai:$CI_COMMIT_SHA "$DOCKERHUB_USERNAME/ssarvis-ai:buildcache"
    - docker push "$DOCKERHUB_USERNAME/ssarvis-ai:$CI_COMMIT_SHA"
    - docker push "$DOCKERHUB_USERNAME/ssarvis-ai:buildcache"
    - docker run --rm -e TRIVY_USERNAME="$DOCKERHUB_USERNAME" -e TRIVY_PASSWORD="$DOCKERHUB_TOKEN" -e TRIVY_NO_PROGRESS=true -v "$CI_PROJECT_DIR:/work" -w /work docker.io/aquasec/trivy:0.63.0 image --format template --template "@infra/trivy/html.tpl" -o ai-image-report.html "$DOCKERHUB_USERNAME/ssarvis-ai:$CI_COMMIT_SHA"
    - docker run --rm -e TRIVY_USERNAME="$DOCKERHUB_USERNAME" -e TRIVY_PASSWORD="$DOCKERHUB_TOKEN" -e TRIVY_NO_PROGRESS=true docker.io/aquasec/trivy:0.63.0 image --exit-code 1 --severity "$TRIVY_FAIL_SEVERITY" "$DOCKERHUB_USERNAME/ssarvis-ai:$CI_COMMIT_SHA"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "develop"'
      changes:
        - infra/.gitlab-ci.yml
        - ai/**/*
      when: on_success
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "main"'
      when: on_success
    - when: never
  artifacts:
    when: always
    paths:
      - ai-image-report.html

.promote_image_template:
  extends: .build_and_scan_template
  before_script:
    - echo "source=$CI_PIPELINE_SOURCE branch=$CI_COMMIT_BRANCH sha=$CI_COMMIT_SHA"
    - docker info
    - apk add --no-cache git
    - echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin

# deploy stage
deploy:
  tags: [docker-shared]
  stage: deploy
  image: alpine:3.19.9
  before_script:
    - echo "source=$CI_PIPELINE_SOURCE branch=$CI_COMMIT_BRANCH sha=$CI_COMMIT_SHA"
    - apk add --no-cache bash openssh-client
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - chmod 600 "$SSH_KEY"
    - ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts
    - chmod 644 ~/.ssh/known_hosts
  script:
    - export REMOTE_DEPLOY_DIR="/home/$USER/ssarvis/infra/deploy"
    - mkdir -p .deploy/env
    - |
      cat <<EOF > .deploy/env/app.env
      BACKEND_IMAGE=$DOCKERHUB_USERNAME/ssarvis-backend
      BACKEND_TAG=$CI_COMMIT_SHA
      WEB_IMAGE=$DOCKERHUB_USERNAME/ssarvis-web
      WEB_TAG=$CI_COMMIT_SHA
      DOCKERHUB_USERNAME=$DOCKERHUB_USERNAME

      MYSQL_HOST=$MYSQL_HOST
      MYSQL_PORT=$MYSQL_PORT
      MYSQL_DATABASE=$MYSQL_DATABASE
      MYSQL_USER=$MYSQL_USER

      REDIS_HOST=$REDIS_HOST
      REDIS_PORT=$REDIS_PORT

      SSE_TIMEOUT=$SSE_TIMEOUT
      JWT_ACCESS_TOKEN_TIME=$JWT_ACCESS_TOKEN_TIME
      JWT_REFRESH_TOKEN_TIME=$JWT_REFRESH_TOKEN_TIME

      ELASTIC_APM_SERVICE_NAME=$ELASTIC_APM_SERVICE_NAME
      ELASTIC_APM_ENVIRONMENT=$ELASTIC_APM_ENVIRONMENT
      ELASTIC_APM_APPLICATION_PACKAGES=$ELASTIC_APM_APPLICATION_PACKAGES

      MAIL_USERNAME=$MAIL_USERNAME
      MAIL_PASSWORD=$MAIL_PASSWORD
      CLOUDFRONT_DOMAIN=$CLOUDFRONT_DOMAIN
      EOF
    - |
      cat <<EOF > .deploy/env/db.env
      MYSQL_DATABASE=$MYSQL_DATABASE
      MYSQL_USER=$MYSQL_USER
      EOF
    - |
      cat <<EOF > .deploy/env/ai.env
      AI_IMAGE=$DOCKERHUB_USERNAME/ssarvis-ai
      AI_TAG=$CI_COMMIT_SHA

      OPENAI_BASE_URL=$OPENAI_BASE_URL
      LLM_MODEL=$LLM_MODEL
      LLM_TIMEOUT_SECONDS=$LLM_TIMEOUT_SECONDS
      EMBEDDING_MODEL=$EMBEDDING_MODEL
      EMBEDDING_DIMENSIONS=$EMBEDDING_DIMENSIONS
      PROMPT_META_FILE=$PROMPT_META_FILE
      PROMPT_UPDATE_META_FILE=$PROMPT_UPDATE_META_FILE

      SIMILAR_CONVERSATIONS_LIMIT=$SIMILAR_CONVERSATIONS_LIMIT
      SIMILAR_CONVERSATIONS_PREFIX_FILE=$SIMILAR_CONVERSATIONS_PREFIX_FILE
      RESPONSE_GUIDELINE_PROMPT_FILE=$RESPONSE_GUIDELINE_PROMPT_FILE
      PUBLIC_CONVERSATION_GUIDELINE_PROMPT_FILE=$PUBLIC_CONVERSATION_GUIDELINE_PROMPT_FILE

      TTS_MODEL=$TTS_MODEL
      TTS_VOICE_ENROLLMENT_MODEL=$TTS_VOICE_ENROLLMENT_MODEL
      TTS_AUDIO_MIME_TYPE=$TTS_AUDIO_MIME_TYPE
      TTS_WS_URL=$TTS_WS_URL
      TTS_ENROLLMENT_URL=$TTS_ENROLLMENT_URL
      TTS_HTTP_TIMEOUT_SECONDS=$TTS_HTTP_TIMEOUT_SECONDS

      QDRANT_URL=$QDRANT_URL
      QDRANT_API_KEY=$QDRANT_API_KEY
      QDRANT_COLLECTION_NAME=$QDRANT_COLLECTION_NAME
      QDRANT_TIMEOUT_SECONDS=$QDRANT_TIMEOUT_SECONDS
      QDRANT_VECTOR_SIZE=$QDRANT_VECTOR_SIZE

      OPUS_DLL_DIRECTORY=$OPUS_DLL_DIRECTORY
      OPUS_SAMPLE_RATE=$OPUS_SAMPLE_RATE
      OPUS_CHANNELS=$OPUS_CHANNELS
      OPUS_FRAME_DURATION_MS=$OPUS_FRAME_DURATION_MS
      OPUS_BITRATE=$OPUS_BITRATE
      EOF
    - |
      cat <<EOF > .deploy/env/monitoring.env
      EOF
    - ssh -i "$SSH_KEY" "$USER@$HOST" "mkdir -p '$REMOTE_DEPLOY_DIR/compose' '$REMOTE_DEPLOY_DIR/scripts' '$REMOTE_DEPLOY_DIR/env'"
    - scp -i "$SSH_KEY" infra/deploy/compose/docker-compose.app.yml "$USER@$HOST:$REMOTE_DEPLOY_DIR/compose/"
    - scp -i "$SSH_KEY" infra/deploy/compose/docker-compose.ai.yml "$USER@$HOST:$REMOTE_DEPLOY_DIR/compose/"
    - scp -i "$SSH_KEY" infra/deploy/compose/docker-compose.db.yml "$USER@$HOST:$REMOTE_DEPLOY_DIR/compose/"
    - scp -i "$SSH_KEY" infra/deploy/compose/docker-compose.monitoring.yml "$USER@$HOST:$REMOTE_DEPLOY_DIR/compose/"
    - scp -i "$SSH_KEY" infra/deploy/scripts/deploy.sh "$USER@$HOST:$REMOTE_DEPLOY_DIR/scripts/"
    - scp -i "$SSH_KEY" infra/deploy/scripts/init-network.sh "$USER@$HOST:$REMOTE_DEPLOY_DIR/scripts/"
    - scp -i "$SSH_KEY" .deploy/env/app.env "$USER@$HOST:$REMOTE_DEPLOY_DIR/env/"
    - scp -i "$SSH_KEY" .deploy/env/ai.env "$USER@$HOST:$REMOTE_DEPLOY_DIR/env/"
    - scp -i "$SSH_KEY" .deploy/env/db.env "$USER@$HOST:$REMOTE_DEPLOY_DIR/env/"
    - scp -i "$SSH_KEY" .deploy/env/monitoring.env "$USER@$HOST:$REMOTE_DEPLOY_DIR/env/"
    - ssh -i "$SSH_KEY" "$USER@$HOST" "chmod +x '$REMOTE_DEPLOY_DIR/scripts/init-network.sh' '$REMOTE_DEPLOY_DIR/scripts/deploy.sh' && bash '$REMOTE_DEPLOY_DIR/scripts/deploy.sh'"
  needs:
    - job: build_and_scan_backend
      optional: true
    - job: build_and_scan_web
      optional: true
    - job: build_and_scan_ai
      optional: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "main"'
      when: on_success
    - when: never
