stages:
  - lint
  - test
  - build

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: always
    - when: never

variables:
  IMAGE_TAG: '$CI_COMMIT_SHA'

default:
  before_script:
    - echo "source=$CI_PIPELINE_SOURCE branch=$CI_COMMIT_BRANCH sha=$CI_COMMIT_SHA"

# lint stage
.lint-template:
  tags: [docker-shared]
  stage: lint

lint-backend:
  extends: .lint-template
  image: gradle:8.14.4-jdk21-alpine
  script:
    - cd backend
    - chmod +x gradlew
    - ./gradlew --no-daemon checkstyleMain checkstyleTest
  artifacts:
    when: always
    paths:
      - backend/build/reports/checkstyle/main.html
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

lint-frontend:
  extends: .lint-template
  image: node:24-alpine
  script:
    - cd frontend
    - npm ci
    - npm run lint -- --format stylish | tee eslint-report.txt
    - npm run typecheck
  artifacts:
    when: always
    paths:
      - frontend/eslint-report.txt
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

prettier-check:
  extends: .lint-template
  image: node:24-alpine
  script:
    - cd frontend
    - npm ci
    - npm run format:check
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

lint-python:
  extends: .lint-template
  image: python:3.11-slim
  script:
    - pip install uv
    - cd ai
    - uv sync --frozen
    - uv run ruff check .
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

infra-compose-validate:
  extends: .lint-template
  image: docker:29.3.0
  services:
    - docker:29.3.0-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  script:
    - |
      set -e
      files=$(find infra -maxdepth 1 -type f \( -name "docker-compose*.yml" -o -name "docker-compose*.yaml" \))
      for f in $files; do
        echo "Validating $f"
        docker compose -f "$f" config > /dev/null
      done
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "develop"'
      changes:
        - infra/docker-compose*.yml
        - infra/docker-compose*.yaml
      when: on_success
    - when: never

# test stage

# build stage
.build-template:
  tags: [docker-shared]
  stage: build
  image: docker:29.3.0
  services:
    - docker:29.3.0-dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - docker info

build-backend:
  extends: .build-template
  script:
    - docker build -f ./backend/Dockerfile backend
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "develop"'
      changes:
        - backend/**/*
      when: on_success
    - when: never

build-web:
  extends: .build-template
  script:
    - docker build -f ./infra/nginx/Dockerfile .
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "develop"'
      changes:
        - frontend/**/*
        - infra/nginx/**/*
      when: on_success
    - when: never