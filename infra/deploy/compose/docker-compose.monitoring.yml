services:
  elasticsearch:
    image: elasticsearch:8.19.12
    container_name: elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    expose:
      - "9200"
    networks:
      - monitoring-net
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bash -c 'exec 3<>/dev/tcp/127.0.0.1/9200 && printf \"GET / HTTP/1.0\\r\\n\\r\\n\" >&3 && grep -q \"HTTP/1.0 200\\|HTTP/1.1 200\" <&3'",
        ]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 40s

  logstash:
    image: logstash:8.19.12
    container_name: logstash
    command: >
      logstash -e 'input { tcp { port => 5000 codec => json_lines } }
      output { elasticsearch { hosts => ["http://elasticsearch:9200"] index => "ssarvis-%{+YYYY.MM.dd}" } }'
    expose:
      - "5000"
      - "9600"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - monitoring-net
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bash -c 'exec 3<>/dev/tcp/127.0.0.1/9600 && printf \"GET / HTTP/1.0\\r\\n\\r\\n\" >&3 && grep -q \"HTTP/1.0 200\\|HTTP/1.1 200\" <&3'",
        ]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 40s

  kibana:
    image: kibana:8.19.12
    container_name: kibana
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    expose:
      - "5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - monitoring-net
    restart: unless-stopped

volumes:
  elasticsearch_data:

networks:
  monitoring-net:
    external: true
