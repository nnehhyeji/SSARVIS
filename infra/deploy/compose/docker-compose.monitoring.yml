services:
  elasticsearch:
    image: elasticsearch:8.19.12
    container_name: elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms1g -Xmx1g
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    expose:
      - "9200"
    networks:
      - monitoring-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9200 >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 40s

  logstash:
    image: logstash:8.19.12
    container_name: logstash
    command: >
      logstash -e 'input { tcp { port => 5000 codec => json_lines } }
      output { elasticsearch { hosts => ["http://elasticsearch:9200"] index => "ssarvis-%{+YYYY.MM.dd}" } }'
    ports:
      - "5000:5000"
      - "9600:9600"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - monitoring-net
    restart: unless-stopped

  kibana:
    image: kibana:8.19.12
    container_name: kibana
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - monitoring-net
    restart: unless-stopped

volumes:
  elasticsearch_data:

networks:
  monitoring-net:
    external: true
