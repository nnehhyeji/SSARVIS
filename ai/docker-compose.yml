services:
  ai:
    build: .
    expose:
      - "8000"
    networks:
      - internal-net
    restart: unless-stopped
    depends_on:
      - qdrant

  qdrant:
    image: qdrant/qdrant:latest
    expose:
      - "6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

volumes:
  qdrant_data:
networks:
  internal-net:
    external: true
