spring:
  application:
    name: ssarvis

  datasource:
#    driver-class-name: com.mysql.cj.jdbc.Driver
    driver-class-name: com.p6spy.engine.spy.P6SpyDriver
#    url: jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT}/${MYSQL_DATABASE}?serverTimezone=Asia/Seoul&useSSL=false&allowPublicKeyRetrieval=true
    url: jdbc:p6spy:mysql://${MYSQL_HOST}:${MYSQL_PORT}/${MYSQL_DATABASE}?serverTimezone=Asia/Seoul&useSSL=false&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}

    mongodb:
      uri: ${MONGO_URI}

  sse:
    timeout: ${SSE_TIMEOUT} # nginx proxy timeout이랑 시간 맞추면 될듯?

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 50MB

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        enable_lazy_load_no_trans: false
        show_sql: false
        format_sql: false
        highlight_sql: false
        jdbc:
          time_zone: Asia/Seoul   # 추가
    open-in-view: false

  app:
    slow-query:
      threshold-ms: 10
#      csv-output-dir: ./logs/slow-queries
    slack:
      webhook-url: ${SLACK_WEBHOOK_URL}
      enabled: true
    mattermost:
      webhook-url: ${MATTERMOST_WEBHOOK_URL}
      enabled: true
    s3:
      bucket: ${S3_BUCKET_NAME}
      cloudfront-domain: ${CLOUDFRONT_DOMAIN}
    ai-server:
      url: ${AI_SERVER_URL}

  cloud:
    aws:
      region:
        static: ${AWS_REGION}
      credentials:
        access-key: ${AWS_ACCESS_KEY_ID}
        secret-key: ${AWS_SECRET_ACCESS_KEY}

  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            redirect-uri: ${KAKAO_REDIRECT_URI}
            authorization-grant-type: authorization_code
            client-name: kakao
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me

jwt:
  secret-key: ${JWT_SECRET}
  access-token:
    expiration: ${JWT_ACCESS_TOKEN_TIME}
  refresh-token:
    expiration: ${JWT_REFRESH_TOKEN_TIME}

logging:
  level:
    root: INFO
    com.ssafy.ssarvis: INFO

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    disable-swagger-default-url: true
    operations-sorter: alpha
    tags-sorter: alpha

app:
  fast-api:
    ws-url: ${FAST_API_SERVER_WS_URL}